<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Wireframe — Услуги</title>
  <link rel="stylesheet" href="wireframe.css">
</head>
<body>
<div class="wf-container">
  <!-- Header (как на главной) -->
  <div class="wf-header">
    <div class="wf-logo wf-label"><span class="wf-label-num">1</span></div>
    <div class="wf-nav-block wf-label"><span class="wf-label-num">2</span><div class="wf-nav-items"><div class="wf-nav-item"></div><div class="wf-nav-item"></div><div class="wf-nav-item"></div><div class="wf-nav-item"></div><div class="wf-nav-item"></div></div><div class="wf-phone"></div></div>
    <div class="wf-btn wf-label"><span class="wf-label-num">3</span>Запись</div>
  </div>

  <!-- Page Header -->
  <div style="text-align: center; margin: 40px 0 20px;" class="wf-label">
    <span class="wf-label-num">21</span>
    <div class="wf-section-title" style="margin-bottom: 10px;"></div>
    <div style="width: 300px; height: 20px; background: #c7c7c7; border: 1px solid #999; margin: 0 auto;"></div>
  </div>

  <!-- Три блока услуг -->
  <div class="wf-grid wf-grid-3 wf-label">
    <span class="wf-label-num">22</span>
    <div class="wf-card wf-label">
      <span class="wf-label-num">23</span>
      <div class="wf-card-title"></div>
      <div class="wf-card-text" style="height: 60px;"></div>
      <div style="text-align: left; margin-top: 15px;">
        <div style="display: flex; gap: 5px; margin-bottom: 5px;"><span class="wf-icon" style="width: 10px;"></span><span class="wf-text-line" style="width: 80%;"></span></div>
        <div style="display: flex; gap: 5px; margin-bottom: 5px;"><span class="wf-icon" style="width: 10px;"></span><span class="wf-text-line" style="width: 70%;"></span></div>
        <div style="display: flex; gap: 5px; margin-bottom: 5px;"><span class="wf-icon" style="width: 10px;"></span><span class="wf-text-line" style="width: 75%;"></span></div>
      </div>
    </div>
    <div class="wf-card"><div class="wf-card-title"></div><div class="wf-card-text" style="height: 60px;"></div></div>
    <div class="wf-card"><div class="wf-card-title"></div><div class="wf-card-text" style="height: 60px;"></div></div>
  </div>

  <div style="text-align: center; margin-top: 30px;">
    <span class="wf-btn wf-label"><span class="wf-label-num">24</span>Посмотреть цены</span>
  </div>

  <!-- Footer (как на главной) -->
  <div class="wf-footer">
    <div class="wf-footer-legal-block wf-label"><span class="wf-label-num">19</span><div class="wf-footer-text"></div><div class="wf-footer-inn"></div><div class="wf-footer-privacy"></div></div>
    <div class="wf-footer-links-block wf-label"><span class="wf-label-num">20</span><div class="wf-footer-link"></div><div class="wf-footer-link"></div><div class="wf-footer-link"></div><div class="wf-footer-link"></div></div>
  </div>
</div>
</body>
</html>
