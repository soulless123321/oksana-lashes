<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Wireframe — Контакты</title>
  <link rel="stylesheet" href="wireframe.css">
</head>
<body>
<div class="wf-container">
  <!-- Header -->
  <div class="wf-header">
    <div class="wf-logo wf-label"><span class="wf-label-num">1</span></div>
    <div class="wf-nav-block wf-label"><span class="wf-label-num">2</span><div class="wf-nav-items"><div class="wf-nav-item"></div><div class="wf-nav-item"></div><div class="wf-nav-item"></div><div class="wf-nav-item"></div><div class="wf-nav-item"></div></div><div class="wf-phone"></div></div>
    <div class="wf-btn wf-label"><span class="wf-label-num">3</span>Запись</div>
  </div>

  <!-- Page Header -->
  <div style="text-align: center; margin: 40px 0 20px;" class="wf-label">
    <span class="wf-label-num">31</span>
    <div class="wf-section-title" style="margin-bottom: 10px;"></div>
    <div style="width: 300px; height: 20px; background: #c7c7c7; border: 1px solid #999; margin: 0 auto;"></div>
  </div>

  <!-- Контакты -->
  <div class="wf-contact-row wf-label">
    <span class="wf-label-num">32</span>
    <div>
      <div style="width: 200px; height: 30px; background: #b3b3b3; border: 1px solid #888; margin-bottom: 20px;"></div>
      <p><span class="wf-icon"></span><span class="wf-text-line"></span></p>
      <p><span class="wf-icon"></span><span class="wf-text-line"></span></p>
      <p><span class="wf-icon"></span><span class="wf-text-line"></span></p>
      <div class="wf-btn wf-label"><span class="wf-label-num">33</span>Запись</div>
    </div>
    <div class="wf-map-placeholder wf-label">
      <span class="wf-label-num">34</span>
      <div class="wf-image-strikethrough" style="width: 100%; height: 100%;"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="wf-footer">
    <div class="wf-footer-legal-block wf-label"><span class="wf-label-num">19</span><div class="wf-footer-text"></div><div class="wf-footer-inn"></div><div class="wf-footer-privacy"></div></div>
    <div class="wf-footer-links-block wf-label"><span class="wf-label-num">20</span><div class="wf-footer-link"></div><div class="wf-footer-link"></div><div class="wf-footer-link"></div><div class="wf-footer-link"></div></div>
  </div>
</div>
</body>
</html>
