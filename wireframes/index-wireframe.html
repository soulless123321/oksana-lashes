<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframe — Главная</title>
  <link rel="stylesheet" href="wireframe.css">
</head>
<body>
<div class="wf-container">
  <!-- Header -->
  <div class="wf-header">
    <div class="wf-logo wf-label"><span class="wf-label-num">1</span></div>
    <div class="wf-nav-block wf-label">
      <span class="wf-label-num">2</span>
      <div class="wf-nav-items">
        <div class="wf-nav-item"></div>
        <div class="wf-nav-item"></div>
        <div class="wf-nav-item"></div>
        <div class="wf-nav-item"></div>
        <div class="wf-nav-item"></div>
      </div>
      <div class="wf-phone"></div>
    </div>
    <div class="wf-btn wf-label"><span class="wf-label-num">3</span>Запись</div>
  </div>

  <!-- Hero -->
  <div class="wf-hero wf-label">
    <span class="wf-label-num">4</span>
    <div class="wf-hero-content">
      <div class="wf-hero-title"></div>
      <div class="wf-hero-subtitle"></div>
      <div class="wf-btn wf-label"><span class="wf-label-num">5</span>Записаться</div>
    </div>
    <div class="wf-hero-image">
      <div class="wf-image-strikethrough"></div>
    </div>
  </div>

  <!-- О мастере -->
  <section style="margin-bottom: 40px;" class="wf-label">
    <span class="wf-label-num">6</span>
    <div class="wf-section-title"></div>
    <div style="max-width: 600px; margin: 0 auto;">
      <div style="display: flex; gap: 10px; margin-bottom: 10px;"><span class="wf-icon"></span><span class="wf-text-line" style="width: 80%;"></span></div>
      <div style="display: flex; gap: 10px; margin-bottom: 10px;"><span class="wf-icon"></span><span class="wf-text-line" style="width: 70%;"></span></div>
      <div style="display: flex; gap: 10px; margin-bottom: 10px;"><span class="wf-icon"></span><span class="wf-text-line" style="width: 75%;"></span></div>
      <div style="display: flex; gap: 10px; margin-bottom: 10px;"><span class="wf-icon"></span><span class="wf-text-line" style="width: 60%;"></span></div>
    </div>
  </section>

  <!-- Преимущества -->
  <section style="margin-bottom: 40px;" class="wf-label">
    <span class="wf-label-num">7</span>
    <div class="wf-section-title"></div>
    <div class="wf-grid wf-grid-4">
      <div class="wf-card wf-label">
        <span class="wf-label-num">8</span>
        <div class="wf-card-icon"></div>
        <div class="wf-card-title"></div>
        <div class="wf-card-text"></div>
      </div>
      <div class="wf-card"><div class="wf-card-icon"></div><div class="wf-card-title"></div><div class="wf-card-text"></div></div>
      <div class="wf-card"><div class="wf-card-icon"></div><div class="wf-card-title"></div><div class="wf-card-text"></div></div>
      <div class="wf-card"><div class="wf-card-icon"></div><div class="wf-card-title"></div><div class="wf-card-text"></div></div>
    </div>
  </section>

  <!-- Услуги кратко -->
  <section style="margin-bottom: 40px;" class="wf-label">
    <span class="wf-label-num">9</span>
    <div class="wf-section-title"></div>
    <div class="wf-grid wf-grid-3">
      <div class="wf-card wf-label">
        <span class="wf-label-num">10</span>
        <div class="wf-card-title"></div>
        <div class="wf-card-text"></div>
        <div class="wf-btn" style="margin-top: 15px;">Подробнее</div>
      </div>
      <div class="wf-card"><div class="wf-card-title"></div><div class="wf-card-text"></div><div class="wf-btn" style="margin-top: 15px;">Подробнее</div></div>
      <div class="wf-card"><div class="wf-card-title"></div><div class="wf-card-text"></div><div class="wf-btn" style="margin-top: 15px;">Подробнее</div></div>
    </div>
    <div style="text-align: center; margin-top: 20px;"><span class="wf-btn wf-label"><span class="wf-label-num">11</span>Смотреть прайс</span></div>
  </section>

  <!-- Портфолио (карусель) -->
  <section style="margin-bottom: 40px;" class="wf-label">
    <span class="wf-label-num">12</span>
    <div class="wf-section-title"></div>
    <div class="wf-carousel">
      <span class="wf-btn" style="padding: 4px 10px;">←</span>
      <div class="wf-carousel-viewport">
        <div class="wf-image-strikethrough" style="width: 100%; height: 100%;"></div>
      </div>
      <span class="wf-btn" style="padding: 4px 10px;">→</span>
    </div>
    <div class="wf-carousel-dots">
      <span class="wf-dot"></span><span class="wf-dot"></span><span class="wf-dot"></span><span class="wf-dot"></span>
    </div>
  </section>

  <!-- Отзывы -->
  <section style="margin-bottom: 40px;" class="wf-label">
    <span class="wf-label-num">13</span>
    <div class="wf-section-title"></div>
    <div style="text-align: center; margin-bottom: 20px;">
      <span style="font-size: 24px; letter-spacing: 4px;">★★★★★</span>
      <span style="font-weight: bold; margin-left: 10px;">4.9</span>
    </div>
    <div class="wf-grid wf-grid-3">
      <div class="wf-card wf-label">
        <span class="wf-label-num">14</span>
        <div class="wf-card-text" style="height: 50px;"></div>
        <div class="wf-card-title" style="width: 40%;"></div>
      </div>
      <div class="wf-card"><div class="wf-card-text" style="height: 50px;"></div><div class="wf-card-title" style="width: 40%;"></div></div>
      <div class="wf-card"><div class="wf-card-text" style="height: 50px;"></div><div class="wf-card-title" style="width: 40%;"></div></div>
    </div>
    <div style="text-align: center; margin-top: 20px;"><span class="wf-btn wf-label"><span class="wf-label-num">15</span>Читать отзывы</span></div>
  </section>

  <!-- Контакты -->
  <section style="margin-bottom: 40px;" class="wf-label">
    <span class="wf-label-num">16</span>
    <div class="wf-section-title"></div>
    <div class="wf-contact-row">
      <div class="wf-contact-details">
        <p><span class="wf-icon"></span><span class="wf-text-line"></span></p>
        <p><span class="wf-icon"></span><span class="wf-text-line"></span></p>
        <p><span class="wf-icon"></span><span class="wf-text-line"></span></p>
        <div class="wf-btn wf-label"><span class="wf-label-num">17</span>Запись</div>
      </div>
      <div class="wf-map-placeholder wf-label">
        <span class="wf-label-num">18</span>
        <div class="wf-image-strikethrough" style="width: 100%; height: 100%;"></div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <div class="wf-footer">
    <div class="wf-footer-legal-block wf-label">
      <span class="wf-label-num">19</span>
      <div class="wf-footer-text"></div>
      <div class="wf-footer-inn"></div>
      <div class="wf-footer-privacy"></div>
    </div>
    <div class="wf-footer-links-block wf-label">
      <span class="wf-label-num">20</span>
      <div class="wf-footer-link"></div>
      <div class="wf-footer-link"></div>
      <div class="wf-footer-link"></div>
      <div class="wf-footer-link"></div>
    </div>
  </div>
</div>
</body>
</html>
